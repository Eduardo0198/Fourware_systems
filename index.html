<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPG Preventa</title>
  <link rel="stylesheet" href="./src/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="./assets/img/ppg-logo.png" alt="PPG" class="logo" />
      <span class="brand">PPG Preventa</span>

      <div class="timer-inline">
        <span class="timer-label">Cierra en:</span>
        <span>05d</span><span>:</span><span>12h</span><span>:</span><span>34m</span><span>:</span><span>05s</span>
      </div>
    </div>

    <div class="topbar-center">
      <div class="search-wrap">
        <input type="search" placeholder="Buscar productos..." class="search-input" />
        <button class="search-icon-inside" type="button" aria-label="Buscar">🔍</button>
      </div>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" type="button">👤 Cuenta</button>
      <button class="icon-btn" type="button">🛒</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar-left">
      <button class="menu-item is-active" type="button">Dashboard</button>
      <button class="menu-item" type="button">Historial</button>
      <button class="menu-item" type="button">Carrito</button>
    </aside>

    <main class="content">
      <h1>Contenido principal</h1>
      <p>Área de trabajo.</p>
    </main>
  </div>

  <script type="module" src="./src/js/main.js"></script>
</body>
</html>
